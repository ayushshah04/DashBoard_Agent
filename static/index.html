<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jarvis Dashboard Agent</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070a;
      --panel: #0c1218;
      --panel-2: #101a21;
      --line: rgba(115, 220, 255, 0.24);
      --text: #d9f7ff;
      --muted: #7fa8b4;
      --cyan: #62d9ff;
      --green: #5df0b0;
      --amber: #ffc86b;
      --red: #ff7373;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 34%, rgba(98, 217, 255, 0.18), transparent 32rem),
        linear-gradient(120deg, #05070a, #071014 46%, #05070a);
      color: var(--text);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(98, 217, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(98, 217, 255, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
    }
    .shell {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) 340px;
      gap: 16px;
      min-height: 100vh;
      padding: 18px;
    }
    header, aside, main, section {
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      box-shadow: 0 0 28px rgba(98, 217, 255, 0.08);
    }
    aside, main, section { border-radius: 8px; }
    .side {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 16px;
    }
    .brand {
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cyan);
      font-size: 12px;
    }
    .core {
      width: min(168px, 70vw);
      aspect-ratio: 1;
      margin: 12px auto;
      border-radius: 50%;
      border: 1px solid rgba(98, 217, 255, 0.7);
      background:
        radial-gradient(circle, rgba(255,255,255,0.92) 0 8%, rgba(98,217,255,0.85) 9% 18%, transparent 19%),
        conic-gradient(from 0deg, transparent 0 12%, rgba(98,217,255,0.95) 13% 17%, transparent 18% 33%, rgba(93,240,176,0.85) 34% 38%, transparent 39% 100%);
      box-shadow: inset 0 0 28px rgba(98, 217, 255, 0.8), 0 0 44px rgba(98, 217, 255, 0.42);
      animation: spin 12s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .metric {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 10px 0;
      border-top: 1px solid rgba(115, 220, 255, 0.12);
    }
    .metric span { color: var(--muted); }
    .metric strong { color: var(--green); font-weight: 600; }
    main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
      overflow: hidden;
    }
    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 44px);
      font-weight: 700;
      letter-spacing: 0;
    }
    .status {
      color: var(--amber);
      border: 1px solid rgba(255, 200, 107, 0.34);
      border-radius: 999px;
      padding: 8px 12px;
      white-space: nowrap;
    }
    .feed {
      overflow: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .bubble {
      max-width: 900px;
      border: 1px solid rgba(115, 220, 255, 0.2);
      background: rgba(16, 26, 33, 0.72);
      border-radius: 8px;
      padding: 12px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .bubble.user { border-color: rgba(93, 240, 176, 0.35); margin-left: auto; }
    .bubble.tool { border-color: rgba(255, 200, 107, 0.32); font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 12px; }
    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 16px;
      border-top: 1px solid var(--line);
    }
    textarea, input {
      width: 100%;
      min-height: 52px;
      resize: vertical;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #071014;
      color: var(--text);
      padding: 12px;
      font: inherit;
      outline: none;
    }
    button {
      border: 1px solid rgba(98, 217, 255, 0.58);
      background: #09202b;
      color: var(--text);
      border-radius: 8px;
      padding: 0 18px;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: progress; }
    .right {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 16px;
      min-height: 0;
    }
    section {
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    h2 {
      margin: 0;
      padding: 14px 16px;
      font-size: 13px;
      color: var(--cyan);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--line);
    }
    .list {
      overflow: auto;
      padding: 12px;
      display: grid;
      gap: 8px;
      align-content: start;
    }
    .pill {
      border: 1px solid rgba(115, 220, 255, 0.18);
      background: rgba(7, 16, 20, 0.82);
      border-radius: 8px;
      padding: 9px 10px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }
    .pill.hot { color: var(--green); border-color: rgba(93, 240, 176, 0.28); }
    @media (max-width: 1050px) {
      .shell { grid-template-columns: 1fr; }
      .right { grid-template-rows: auto auto; }
      form { grid-template-columns: 1fr; }
      button { min-height: 46px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side">
      <div class="brand">Jarvis Agent</div>
      <div class="core" aria-label="reactor core"></div>
      <div class="metric"><span>Model</span><strong id="model">gpt-5.5</strong></div>
      <div class="metric"><span>MCP servers</span><strong id="serverCount">0</strong></div>
      <div class="metric"><span>Tools</span><strong id="toolCount">0</strong></div>
      <div class="metric"><span>Mode</span><strong>Paper-safe</strong></div>
    </aside>

    <main>
      <div class="topbar">
        <h1>Coding Command Deck</h1>
        <div class="status" id="status">Idle</div>
      </div>
      <div class="feed" id="feed"></div>
      <form id="form">
        <textarea id="prompt" placeholder="Ask Jarvis to build code, inspect files, run Python, or query Alpaca market tools..."></textarea>
        <button id="send" type="submit">Run</button>
      </form>
    </main>

    <div class="right">
      <section>
        <h2>Tool Registry</h2>
        <div class="list" id="tools"></div>
      </section>
      <section>
        <h2>Live Activity</h2>
        <div class="list" id="activity"></div>
      </section>
    </div>
  </div>

  <script>
    const feed = document.querySelector("#feed");
    const form = document.querySelector("#form");
    const promptBox = document.querySelector("#prompt");
    const send = document.querySelector("#send");
    const statusEl = document.querySelector("#status");
    const toolsEl = document.querySelector("#tools");
    const activityEl = document.querySelector("#activity");
    const modelEl = document.querySelector("#model");
    const toolCount = document.querySelector("#toolCount");
    const serverCount = document.querySelector("#serverCount");

    let socket;

    function addBubble(text, kind = "") {
      const div = document.createElement("div");
      div.className = `bubble ${kind}`;
      div.textContent = text;
      feed.appendChild(div);
      feed.scrollTop = feed.scrollHeight;
    }

    function addActivity(text, hot = false) {
      const div = document.createElement("div");
      div.className = `pill ${hot ? "hot" : ""}`;
      div.textContent = text;
      activityEl.prepend(div);
    }

    function connect() {
      const protocol = location.protocol === "https:" ? "wss" : "ws";
      socket = new WebSocket(`${protocol}://${location.host}/ws/agent`);
      socket.onopen = () => {
        statusEl.textContent = "Connected";
      };
      socket.onclose = () => {
        statusEl.textContent = "Disconnected";
        send.disabled = false;
      };
      socket.onerror = () => {
        statusEl.textContent = "Socket error";
        send.disabled = false;
      };
      socket.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === "registry") {
          modelEl.textContent = msg.model;
          serverCount.textContent = msg.servers.length;
          toolCount.textContent = msg.tools.length;
          toolsEl.innerHTML = "";
          msg.tools.forEach((tool) => {
            const div = document.createElement("div");
            div.className = "pill hot";
            div.textContent = tool;
            toolsEl.appendChild(div);
          });
          addActivity(`Loaded ${msg.tools.length} tools from ${msg.servers.join(", ")}`, true);
        } else if (msg.type === "assistant_text") {
          addBubble(msg.text);
        } else if (msg.type === "tool_call") {
          addBubble(`${msg.name}\n${JSON.stringify(msg.input, null, 2)}`, "tool");
          addActivity(`Calling ${msg.name}`, true);
        } else if (msg.type === "tool_result") {
          addBubble(`${msg.name} result\n${msg.output}`, "tool");
          addActivity(`Result from ${msg.name}`);
        } else if (msg.type === "thinking" || msg.type === "status") {
          statusEl.textContent = msg.message;
          addActivity(msg.message);
        } else if (msg.type === "error" || msg.type === "tool_error") {
          statusEl.textContent = "Error";
          addBubble(msg.error, "tool");
          send.disabled = false;
        } else if (msg.type === "done") {
          statusEl.textContent = msg.warning || "Done";
          send.disabled = false;
        }
      };
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const prompt = promptBox.value.trim();
      if (!prompt) return;
      if (!socket || socket.readyState !== WebSocket.OPEN) connect();
      addBubble(prompt, "user");
      send.disabled = true;
      const sendPayload = () => socket.send(JSON.stringify({ prompt }));
      if (socket.readyState === WebSocket.OPEN) sendPayload();
      else socket.addEventListener("open", sendPayload, { once: true });
    });

    promptBox.value = "Build a Python prime checker, save it as prime.py, and test it with 97.";
    connect();
  </script>
</body>
</html>
